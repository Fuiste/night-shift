default_profile = "default"
planning_profile = "planner"
execution_profile = "builder"

base_branch = "main"
max_workers = 4
branch_prefix = "night-shift"
pr_title_prefix = "[night-shift]"
notifiers = ["console", "report_file"]

[profiles.default]
provider = "codex"

[profiles.planner]
provider = "cursor"
model = "sonnet-4"

[profiles.planner.provider_overrides]
mode = "plan"

[profiles.builder]
provider = "codex"
model = "gpt-5.4"
reasoning = "high"

[profiles.reviewer]
provider = "cursor"
model = "sonnet-4"

[profiles.reviewer.provider_overrides]
mode = "ask"

[verification]
commands = []
