<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/site.css' | relative_url }}">
  </head>
  <body>
    <div class="accent-bar" aria-hidden="true"></div>
    <div class="shell">
      <header class="masthead">
        <a class="masthead-link" href="{{ '/' | relative_url }}">
          <p class="eyebrow">Documentation</p>
          <h1>{{ site.title }}</h1>
        </a>
        <p class="lede">{{ site.description }}</p>
      </header>
      <div class="frame">
        <aside class="sidebar">
          {% include nav.html %}
        </aside>
        <main class="content">
          {{ content }}
        </main>
      </div>
      <footer class="footer">
        <p>Night Shift &mdash; repo-local autonomous coding orchestration</p>
      </footer>
    </div>
  </body>
</html>
